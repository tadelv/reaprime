name: Create Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v2.1.3, etc.

# bundle_skins.sh (invoked by flutter_with_commit.sh) hits api.github.com.
# Without auth, all jobs share the runner IP's 60 req/hr limit and silently
# get empty manifests. Expose GITHUB_TOKEN to every job so curl gets 5000/hr.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.2'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 35
        uses: android-actions/setup-android@v4

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/app/debug.keystore

      - name: Cache Flutter & Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            ~/.gradle
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build DYE2 plugin
        run: |
          cd packages/dye2-plugin
          npm ci
          npm run build

      - name: Build Android APK
        run: ./flutter_with_commit.sh build apk --release
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/decent-android-${{ steps.version.outputs.version }}.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/decent-android-${{ steps.version.outputs.version }}.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.2'

      - name: Install dependencies
        run: |
          flutter pub get
          brew install automake libtool

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build DYE2 plugin
        run: |
          cd packages/dye2-plugin
          npm ci
          npm run build

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      # ---- Import signing certificate ----
      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Decode and import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          
          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Make this keychain the default
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          
          # Clean up
          rm certificate.p12

      # ---- Build ----
      - name: Build macOS app
        run: ./flutter_with_commit.sh build macos --release
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}

      - name: Codesign app (hardened runtime)
        run: |
          APP="build/macos/Build/Products/Release/Decent.app"
          codesign --deep --force \
            --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "Developer ID Application" \
            "$APP"

      # ---- Notarize ----
      - name: Zip app for notarization
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent Decent.app Decent.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit \
            build/macos/Build/Products/Release/Decent.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait 2>&1 | tee notarization.log
          # Show full log on failure
          if grep -q "status: Invalid" notarization.log; then
            ID=$(grep -o '[0-9a-f\-]\{36\}' notarization.log | head -1)
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$TEAM_ID" \
              --password "$APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          # Retry stapling — ticket propagation can lag behind notarytool --wait
          for i in 1 2 3 4 5; do
            if xcrun stapler staple build/macos/Build/Products/Release/Decent.app; then
              exit 0
            fi
            echo "Staple attempt $i failed, waiting 15s..."
            sleep 15
          done
          echo "Stapling failed after 5 attempts"
          exit 1

      # ---- Final ZIP ----
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release ZIP
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent Decent.app ../../../../../decent-macos-${{ steps.version.outputs.version }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: macos-app
          path: decent-macos-${{ steps.version.outputs.version }}.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsecret-1-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build DYE2 plugin
        run: |
          cd packages/dye2-plugin
          npm ci
          npm run build

      - name: Build Linux app (unsigned)
        run: ./flutter_with_commit.sh build linux --release
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Linux archive
        run: |
          cd build/linux/x64/release
          tar -czf ../../../../decent-linux-x64-${{ steps.version.outputs.version }}.tar.gz bundle

      - name: Upload Linux app artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-app
          path: decent-linux-x64-${{ steps.version.outputs.version }}.tar.gz

  build-raspberrypi:
    name: Build for Raspberry Pi (ARM64 / Pi 4+)
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsecret-1-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Flutter publishes no prebuilt arm64 Linux SDK; the master channel
          # path lets flutter-action git-clone the tagged version instead.
          channel: 'master'
          flutter-version: '3.44.2'

      - name: Run git safe dir
        run: git config --global --add safe.directory /opt/hostedtoolcache/flutter/${{ steps.flutter-action.outputs.CHANNEL }}-${{ steps.flutter-action.outputs.VERSION }}-${{ steps.flutter-action.outputs.ARCHITECTURE }}

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build DYE2 plugin
        run: |
          cd packages/dye2-plugin
          npm ci
          npm run build

      - name: Build Linux app (ARM64)
        run: ./flutter_with_commit.sh build linux --release
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Raspberry Pi archive
        run: |
          cd build/linux/arm64/release
          tar -czf ../../../../decent-linux-arm64-${{ steps.version.outputs.version }}.tar.gz bundle

      - name: Upload Raspberry Pi build artifact
        uses: actions/upload-artifact@v7
        with:
          name: raspberrypi-linux-arm64-app
          path: decent-linux-arm64-${{ steps.version.outputs.version }}.tar.gz

  build-windows:
    # Pinned: windows-latest rolled to VS 18 / MSVC 14.51, which hard-errors on
    # <experimental/coroutine> still used by flutter_inappwebview_windows and
    # permission_handler_windows. Revisit when plugins migrate to C++20 <coroutine>.
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.2'

      - name: Install nuget
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build DYE2 plugin
        run: |
          cd packages/dye2-plugin
          npm ci
          npm run build

      - name: Build Windows app (unsigned)
        shell: bash
        run: ./flutter_with_commit.sh build windows --release
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Windows archive
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath decent-windows-x64-${{ steps.version.outputs.version }}.zip

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-app
          path: decent-windows-x64-${{ steps.version.outputs.version }}.zip

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: xcodes select 26.3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.2'

      # Flutter >=3.44 defaults Swift Package Manager on, which skips
      # `pod install` so ios/Pods (and FirebaseCrashlytics/upload-symbols)
      # never gets generated and the dSYM upload step below fails. The iOS
      # project is committed as CocoaPods (0 SPM refs) and local dev runs
      # with SPM disabled, so pin CI to the same CocoaPods path.
      - name: Disable Swift Package Manager (use CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Flutter & CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            ios/Pods
          key: ${{ runner.os }}-ios-flutter-${{ hashFiles('**/pubspec.yaml', '**/Podfile.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build DYE2 plugin
        run: |
          cd packages/dye2-plugin
          npm ci
          npm run build

      - name: Import distribution certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make this keychain the default
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Clean up
          rm certificate.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"

          # Extract UUID and install with correct filename
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision

      - name: Switch to manual signing for CI
        env:
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ""/PROVISIONING_PROFILE_SPECIFIER = "'"$PROVISIONING_PROFILE_NAME"'"/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' "$PBXPROJ"

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.tadel.reaprime</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: ./flutter_with_commit.sh build ipa --release --dart-define=APP_STORE=true --export-options-plist=ExportOptions.plist
        env:
          FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}

      - name: Upload dSYMs to Firebase Crashlytics
        run: |
          DSYM_PATH="build/ios/archive/Runner.xcarchive/dSYMs"
          if [ ! -d "$DSYM_PATH" ] || [ -z "$(ls -A "$DSYM_PATH" 2>/dev/null)" ]; then
            echo "::warning::No dSYMs found at $DSYM_PATH"
            ls -la build/ios/archive/Runner.xcarchive/ || true
            exit 0
          fi

          echo "Found dSYMs:"
          ls -la "$DSYM_PATH"

          flutterfire upload-crashlytics-symbols \
            --upload-symbols-script-path="ios/Pods/FirebaseCrashlytics/upload-symbols" \
            --platform=ios \
            --apple-project-path="ios" \
            --env-platform-name="iphoneos" \
            --env-configuration="Release" \
            --env-project-dir="ios" \
            --env-built-products-dir="build/ios/archive/Runner.xcarchive/Products/Applications" \
            --env-dwarf-dsym-folder-path="$DSYM_PATH" \
            --env-dwarf-dsym-file-name="Runner.app.dSYM" \
            --env-infoplist-path="Runner.app/Info.plist" \
            --default-config=default

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          # Write the API key to the expected location
          mkdir -p ~/.private_keys
          echo "$API_KEY_P8" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

          # Find the built IPA
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)

          if [ -z "$IPA_PATH" ]; then
            echo "Error: No IPA found in build/ios/ipa/"
            exit 1
          fi

          echo "Validating $IPA_PATH..."
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

          echo "Uploading $IPA_PATH to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

          # Clean up API key
          rm -f ~/.private_keys/AuthKey_${API_KEY_ID}.p8

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-macos, build-linux, build-raspberrypi, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/android-apk/*
            release-artifacts/macos-app/*
            release-artifacts/linux-app/*
            release-artifacts/raspberrypi-linux-arm64-app/*
            release-artifacts/windows-app/*
          tag_name: ${{ steps.version.outputs.tag }}
          name: Decent ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'rc') }}
          generate_release_notes: true
          body: |
            ## Decent ${{ steps.version.outputs.version }}
            
            ### Downloads
            
            - **Android**: `decent-android-${{ steps.version.outputs.version }}.apk`
            - **macOS**: `decent-macos-${{ steps.version.outputs.version }}.zip`
            - **Linux x64**: `decent-linux-x64-${{ steps.version.outputs.version }}.tar.gz`
            - **Linux ARM64 (Raspberry Pi)**: `decent-linux-arm64-${{ steps.version.outputs.version }}.tar.gz`
            - **Windows x64**: `decent-windows-x64-${{ steps.version.outputs.version }}.zip`
            
            ### Installation
            
            **Android**: Download the APK and install it on your device.
            
            **macOS**: Download the ZIP, extract it, and move the app to your Applications folder.
            
            **Linux**: Download the tar.gz, extract it, and run the executable inside the bundle directory.
            
            **Windows**: Download the ZIP, extract it, and run the executable inside the extracted folder.
            
            > **Windows users**: Decent requires the [Microsoft Visual C++ Redistributable](https://learn.microsoft.com/en-us/cpp/windows/latest-supported-vc-redist?view=msvc-170#latest-supported-redistributable-version) to be installed. If the app doesn't start, please download and install the latest Visual C++ Redistributable from Microsoft.

            **iOS**: Available via TestFlight. Check the project's TestFlight page for access.
            
            ### What's Changed
            <!-- GitHub will auto-generate release notes here -->
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




