name: onboarding-connection-phases
description: |
  Verify machine state after simulated onboarding connect flow.
  The app starts with simulated devices, auto-connects through onboarding,
  and we verify the machine is in the expected state.

preconditions:
  app_start:
    connectDevice: MockDe1
    connectScale: MockScale

steps:
  # 1. Verify machine is connected and in idle state
  - description: GET machine state shows connected MockDe1
    tool: rest_get
    path: /api/v1/machine/state
    expect:
      status: 200
      body_contains:
        - '"state":'

  # 2. Verify scale is connected
  - description: GET scale state shows connected
    tool: rest_get
    path: /api/v1/scale
    expect:
      status: 200

  # 3. Verify devices endpoint shows connected devices
  - description: GET devices shows discovered devices
    tool: rest_get
    path: /api/v1/devices
    expect:
      status: 200
      body_contains:
        - 'MockDe1'

  # 4. Verify preferred devices were saved from auto-connect
  - description: GET settings shows preferred IDs set from auto-connect
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredMachineId":'
        - '"preferredScaleId":'

postconditions:
  - app_stop
