name: display-brightness-0-100
description: Verify brightness 0-100 API via REST and WebSocket, including validation and low-battery setting

preconditions:
  app_start:
    connectDevice: MockDe1
    connectScale: MockScale

steps:
  # 1. Initial display state has correct shape
  - description: GET display state returns integer brightness and new fields
    tool: rest_get
    path: /api/v1/display
    expect:
      status: 200
      body_contains:
        - '"brightness":100'
        - '"requestedBrightness":100'
        - '"lowBatteryBrightnessActive":false'

  # 2. Set brightness to 50 via REST
  - description: PUT brightness to 50
    tool: rest_put
    path: /api/v1/display/brightness
    body:
      brightness: 50
    expect:
      status: 200
      body_contains:
        - '"brightness":50'
        - '"requestedBrightness":50'

  # 3. Set brightness to 0 (minimum)
  - description: PUT brightness to 0
    tool: rest_put
    path: /api/v1/display/brightness
    body:
      brightness: 0
    expect:
      status: 200
      body_contains:
        - '"brightness":0'

  # 4. Set brightness to 100 (OS-managed restore)
  - description: PUT brightness to 100 restores OS-managed brightness
    tool: rest_put
    path: /api/v1/display/brightness
    body:
      brightness: 100
    expect:
      status: 200
      body_contains:
        - '"brightness":100'

  # 5. Reject out-of-range value (150)
  - description: PUT brightness 150 returns 400
    tool: rest_put
    path: /api/v1/display/brightness
    body:
      brightness: 150
    expect:
      status: 400
      body_contains:
        - '"brightness must be an integer 0-100"'

  # 6. Reject negative value
  - description: PUT brightness -10 returns 400
    tool: rest_put
    path: /api/v1/display/brightness
    body:
      brightness: -10
    expect:
      status: 400
      body_contains:
        - '"brightness must be an integer 0-100"'

  # 7. Reject non-integer type
  - description: PUT brightness with string returns 400
    tool: rest_put
    path: /api/v1/display/brightness
    body:
      brightness: "high"
    expect:
      status: 400
      body_contains:
        - '"brightness must be an integer 0-100"'

  # 8. Old dim endpoint removed
  - description: POST /display/dim returns 404
    tool: rest_post
    path: /api/v1/display/dim
    expect:
      status: 404

  # 9. Old restore endpoint removed
  - description: POST /display/restore returns 404
    tool: rest_post
    path: /api/v1/display/restore
    expect:
      status: 404

  # 10. WebSocket setBrightness command
  - description: Subscribe to display WebSocket
    tool: stream_subscribe
    endpoint: /ws/v1/display

  - description: Send setBrightness 30 via WebSocket
    tool: stream_send
    message:
      command: setBrightness
      brightness: 30

  - description: Read display state update from WebSocket
    tool: stream_read
    expect:
      body_contains:
        - '"brightness":30'
        - '"requestedBrightness":30'

  # 11. WebSocket setBrightness restore to 100
  - description: Send setBrightness 100 via WebSocket
    tool: stream_send
    message:
      command: setBrightness
      brightness: 100

  - description: Read restored display state from WebSocket
    tool: stream_read
    expect:
      body_contains:
        - '"brightness":100'

  # 12. Old dim WebSocket command no longer works
  - description: Send old dim command via WebSocket
    tool: stream_send
    message:
      command: dim

  - description: No state change from old dim command
    tool: stream_read
    expect:
      count: 0

  - description: Unsubscribe from display WebSocket
    tool: stream_unsubscribe

  # 13. lowBatteryBrightnessLimit setting
  - description: Enable lowBatteryBrightnessLimit setting
    tool: settings_update
    settings:
      lowBatteryBrightnessLimit: true

  - description: Verify setting is enabled
    tool: settings_get
    expect:
      body_contains:
        - '"lowBatteryBrightnessLimit":true'

  - description: Disable lowBatteryBrightnessLimit setting
    tool: settings_update
    settings:
      lowBatteryBrightnessLimit: false

postconditions:
  - app_stop
