name: onboarding-preferred-device-flow
description: |
  Verify preferred device settings drive scan/connect behavior.
  Sets fake preferred IDs, connects simulated devices (which don't match),
  then verifies the preferred IDs are updated after connection.

preconditions:
  app_start:
    connectDevice: MockDe1
    connectScale: MockScale

steps:
  # 1. Verify simulated devices connected — preferences updated to MockDe1/MockScale
  - description: GET settings shows MockDe1 as preferred machine after auto-connect
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredMachineId":"MockDe1"'

  - description: GET settings shows Mock Scale as preferred scale after auto-connect
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredScaleId":"Mock Scale"'

  # 2. Set fake preferred device IDs (simulating a different device was previously connected)
  - description: POST fake preferred machine ID
    tool: rest_post
    path: /api/v1/settings
    body:
      preferredMachineId: "DE1-FAKE-12345"
    expect:
      status: 200

  - description: POST fake preferred scale ID
    tool: rest_post
    path: /api/v1/settings
    body:
      preferredScaleId: "SCALE-FAKE-99999"
    expect:
      status: 200

  # 3. Verify fake IDs persisted
  - description: GET settings confirms fake preferred machine ID
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredMachineId":"DE1-FAKE-12345"'

  - description: GET settings confirms fake preferred scale ID
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredScaleId":"SCALE-FAKE-99999"'

  # 4. Clear preferred device IDs (null)
  - description: POST null preferred machine ID
    tool: rest_post
    path: /api/v1/settings
    body:
      preferredMachineId: null
    expect:
      status: 200

  - description: POST null preferred scale ID
    tool: rest_post
    path: /api/v1/settings
    body:
      preferredScaleId: null
    expect:
      status: 200

  # 5. Verify cleared
  - description: GET settings confirms null preferred machine ID
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredMachineId":null'

  - description: GET settings confirms null preferred scale ID
    tool: rest_get
    path: /api/v1/settings
    expect:
      status: 200
      body_contains:
        - '"preferredScaleId":null'

postconditions:
  - app_stop
