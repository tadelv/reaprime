asyncapi: 3.0.0
info:
  title: Decent AsyncAPI
  version: 1.0.0
  description: >
    AsyncAPI specification for Decent WebSocket data streams.


    Most channels are WebSocket-based and emit JSON messages to the client.
    The Devices channel is bidirectional, accepting commands and emitting state.

    These channels provide live updates from the DE1 espresso machine, scale,
    sensors, and connected devices.
servers:
  production:
    host: '{tablet-ip}:8080'
    protocol: ws
    description: WebSocket server providing live updates
    variables:
      tablet-ip:
        default: localhost
channels:
  MachineSnapshot:
    address: ws/v1/machine/snapshot
    description: Real-time snapshot data from the espresso machine.
    messages:
      machineSnapshotMessage:
        $ref: '#/components/messages/MachineSnapshot'
  ShotSettings:
    description: Real-time shot settings updates.
    address: ws/v1/machine/shotSettings
    messages:
      shotSettingsMessage:
        $ref: '#/components/messages/ShotSettings'
  WaterLevels:
    description: Real-time water level updates.
    address: ws/v1/machine/waterLevels
    messages:
      waterLevelsMessage:
        $ref: '#/components/messages/WaterLevels'
  ScaleSnapshot:
    description: >
      Real-time scale weight, smoothed flow, and battery data. The socket is
      held open across scale connect/disconnect cycles — clients should not
      reconnect on scale disconnect. On open and on every scale connection-state
      change the server emits a status frame (`{"status":"connected"}` or
      `{"status":"disconnected"}`). Snapshot frames (see ScaleSnapshot
      schema) are only sent while a scale is connected.
    address: ws/v1/scale/snapshot
    messages:
      scaleSnapshotMessage:
        $ref: '#/components/messages/ScaleSnapshot'
      scaleStatusMessage:
        $ref: '#/components/messages/ScaleStatus'
  MachineRaw:
    description: Real-time raw BLE data from machine (read/write/notify).
    address: ws/v1/machine/raw
    messages:
      machineRawMessage:
        $ref: '#/components/messages/MachineRawMessage'
  ShotState:
    description: >
      Shot state + decision feed from the app's shot sequencer: state
      transitions (idle/preheating/pouring/stopping/finished), why a profile
      step advanced (app-issued weight skip vs firmware-natural), and why the
      shot stopped (target weight/volume, API/app command, machine-reported
      end, error, disconnect). One event type multiplexes all frames,
      discriminated by `event`. On connect the server replays the latest
      frame (an idle frame between shots), so clients can attach once and
      wait — the socket is not gated on a connected machine. Note the feed
      reflects app-side sequencing only: in full gateway mode (backgrounded)
      no sequencer runs and the feed stays idle.
    address: ws/v1/machine/shotState
    messages:
      shotStateEvent:
        $ref: '#/components/messages/ShotStateEvent'
  SensorSnapshot:
    description: Real-time sensor snapshot updates for a specific sensor.
    address: ws/v1/sensors/{id}/snapshot
    parameters:
      id:
        description: Unique sensor identifier.
    messages:
      sensorSnapshotMessage:
        $ref: '#/components/messages/SensorSnapshot'
  Plugins:
    description: Outgoing messages from Decent plugins.
    address: ws/v1/plugins/{id}/{endpoint}
    parameters:
      id:
        description: Unique plugin identifier.
      endpoint:
        description: Plugin specific endpoint.
    messages:
      pluginMessage:
        $ref: '#/components/messages/PluginMessage'
  Logs:
    description: Subscribe to Decent logs
    address: ws/v1/logs
    messages:
      logMessage:
        $ref: '#/components/messages/LogMessage'
  WebviewLogs:
    description: Subscribe to WebView console log messages forwarded from in-app WebViews.
    address: ws/v1/webview/logs
    messages:
      logMessage:
        $ref: '#/components/messages/LogMessage'
  Devices:
    description: >
      Bidirectional channel for device list state and commands.
      Emits full device state snapshots on connect, device list changes,
      individual device connection state changes, scanning state changes,
      and ConnectionManager status updates (phase, found devices, ambiguity).
      Accepts commands to scan, connect, and disconnect devices.
    address: ws/v1/devices
    messages:
      devicesState:
        $ref: '#/components/messages/DevicesState'
      devicesCommand:
        $ref: '#/components/messages/DevicesCommand'
  Display:
    address: ws/v1/display
    description: |
      Streams display state changes (wake-lock and brightness) in real-time.
      Also accepts commands via WebSocket messages:
      - `{"command": "setBrightness", "brightness": 75}` — set brightness (0-100, where 100 returns to OS-managed)
      - `{"command": "requestWakeLock"}` — request wake-lock override
      - `{"command": "releaseWakeLock"}` — release wake-lock override
      Wake-lock overrides requested via this WebSocket are automatically released when the connection closes.
    messages:
      displayState:
        $ref: '#/components/messages/DisplayState'
      displayCommand:
        $ref: '#/components/messages/DisplayCommand'
  Update:
    address: ws/v1/update
    description: |
      Bidirectional app-update channel. Emits an `AppUpdateState` snapshot on
      connect and on every state change. Accepts commands:
      - `{"command": "check"}` — force a re-poll of GitHub releases.
      - `{"command": "install"}` — on Android: auto-check if needed, then
        download + launch the system installer. On other platforms this is not
        supported and replies with a transient `{"error", "url"}`.
      Command-level problems (unknown command, unsupported platform) come back
      as a direct `{"error": ...}` reply; operational outcomes (download/install
      progress and failures) flow through the `AppUpdateState` stream.
    messages:
      updateState:
        $ref: '#/components/messages/UpdateState'
      updateCommand:
        $ref: '#/components/messages/UpdateCommand'

operations:
  machineSnapshot:
    action: receive
    channel:
      $ref: '#/channels/MachineSnapshot'
  shotSettings:
    action: receive
    channel:
      $ref: '#/channels/ShotSettings'
  waterLevels:
    action: receive
    channel:
      $ref: '#/channels/WaterLevels'
  shotState:
    action: receive
    channel:
      $ref: '#/channels/ShotState'
  scaleSnapshot:
    action: receive
    channel:
      $ref: '#/channels/ScaleSnapshot'
  machineRaw:
    action: receive
    channel:
      $ref: '#/channels/MachineRaw'
  sensorSnapshot:
    action: receive
    channel:
      $ref: '#/channels/SensorSnapshot'
  pluginMessage:
    action: receive
    channel:
      $ref: '#/channels/Plugins'
  logMessage:
    action: receive
    channel:
      $ref: '#/channels/Logs'
  webviewLogMessage:
    action: receive
    channel:
      $ref: '#/channels/WebviewLogs'
  devicesState:
    action: receive
    channel:
      $ref: '#/channels/Devices'
    messages:
      - $ref: '#/channels/Devices/messages/devicesState'
  devicesCommand:
    action: send
    channel:
      $ref: '#/channels/Devices'
    messages:
      - $ref: '#/channels/Devices/messages/devicesCommand'
  displayState:
    action: receive
    channel:
      $ref: '#/channels/Display'
    messages:
      - $ref: '#/channels/Display/messages/displayState'
  displayCommand:
    action: send
    channel:
      $ref: '#/channels/Display'
    messages:
      - $ref: '#/channels/Display/messages/displayCommand'
  updateState:
    action: receive
    channel:
      $ref: '#/channels/Update'
    messages:
      - $ref: '#/channels/Update/messages/updateState'
  updateCommand:
    action: send
    channel:
      $ref: '#/channels/Update'
    messages:
      - $ref: '#/channels/Update/messages/updateCommand'

components:
  messages:
    Error:
      name: Error
      title: Error message
      payload:
        $ref: '#/components/schemas/Error'
    ScaleSnapshot:
      name: ScaleSnapshot
      title: Scale Snapshot
      payload:
        $ref: '#/components/schemas/ScaleSnapshot'
    ScaleStatus:
      name: ScaleStatus
      title: Scale connection status
      payload:
        $ref: '#/components/schemas/ScaleStatus'
    MachineSnapshot:
      name: MachineSnapshot
      title: Machine Snapshot
      payload:
        $ref: '#/components/schemas/MachineSnapshot'
    ShotSettings:
      name: ShotSettings
      title: Shot Settings
      payload:
        $ref: '#/components/schemas/ShotSettings'
    WaterLevels:
      name: WaterLevels
      title: Water Levels
      payload:
        $ref: '#/components/schemas/WaterLevels'
    MachineRawMessage:
      name: MachineRawMessage
      title: Machine Raw BLE Message
      payload:
        $ref: '#/components/schemas/De1RawMessage'
    ShotStateEvent:
      name: ShotStateEvent
      title: Shot state / decision event
      payload:
        $ref: '#/components/schemas/ShotStateEvent'
    SensorSnapshot:
      name: SensorSnapshot
      title: Sensor Snapshot
      payload:
        $ref: '#/components/schemas/SensorSnapshot'
    PluginMessage:
      name: PluginMessage
      title: Message from plugin
      payload:
        $ref: '#/components/schemas/PluginMessage'
    LogMessage:
      name: LogMessage
      title: Log message from Decent
      payload:
        $ref: '#/components/schemas/LogMessage'
    DevicesState:
      name: DevicesState
      title: Device list state
      summary: Full snapshot of all known devices and scanning state.
      payload:
        $ref: '#/components/schemas/DevicesState'
    DevicesCommand:
      name: DevicesCommand
      title: Device command
      summary: Command sent by the client to scan, connect, or disconnect devices.
      payload:
        $ref: '#/components/schemas/DevicesCommand'
    DisplayState:
      name: DisplayState
      title: Display state
      summary: Current display state including wake-lock and brightness status.
      payload:
        $ref: '#/components/schemas/DisplayState'
    DisplayCommand:
      name: DisplayCommand
      title: Display command
      summary: Command sent by the client to control display brightness and wake-lock.
      payload:
        $ref: '#/components/schemas/DisplayCommand'
    UpdateState:
      name: UpdateState
      title: App update state
      summary: Snapshot of the app-update state machine.
      payload:
        $ref: '#/components/schemas/AppUpdateState'
    UpdateCommand:
      name: UpdateCommand
      title: App update command
      summary: Command sent by the client to check for or install an app update.
      payload:
        $ref: '#/components/schemas/UpdateCommand'
  schemas:
    Error:
      type: object
      properties:
        e:
          type: string
        st:
          type: string
    AppUpdateState:
      type: object
      description: Snapshot of the app-update state machine.
      required: [phase, currentVersion, releaseUrl, installable]
      properties:
        phase:
          type: string
          enum: [idle, checking, available, downloading, installing, error]
        currentVersion:
          type: string
        latestVersion:
          type: string
          nullable: true
        releaseNotes:
          type: string
          nullable: true
        releaseUrl:
          type: string
          description: Release tag URL when known, otherwise the releases page.
        installable:
          type: boolean
          description: True only on Android AND when an update is available.
        progress:
          type: number
          format: float
          nullable: true
          description: Download progress 0..1 while phase is downloading.
        error:
          type: string
          nullable: true
    UpdateCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
          enum: [check, install]
    ConnectionError:
      type: object
      required: [kind, severity, timestamp, message]
      properties:
        kind:
          type: string
          description: >
            Error kind identifier. Skins should look up localized copy
            by this field. Initial set:
            scaleConnectFailed, machineConnectFailed,
            scaleDisconnected, machineDisconnected,
            adapterOff, bluetoothPermissionDenied, scanFailed,
            profileUploadFailed.
            New kinds may be added without a version bump.

            profileUploadFailed is raised when a profile upload to the
            machine fails and is being retried; it is retracted once a
            retry succeeds.
        severity:
          type: string
          enum: [warning, error]
        timestamp:
          type: string
          format: date-time
        deviceId:
          type: string
          nullable: true
        deviceName:
          type: string
          nullable: true
        message:
          type: string
          description: App-supplied English default message.
        suggestion:
          type: string
          nullable: true
          description: App-supplied English default suggestion for the user.
        details:
          type: object
          additionalProperties: true
          nullable: true
          description: Freeform diagnostic payload; shape varies by kind.
    ScaleSnapshot:
      type: object
      description: >
        Smoothed weight + flow frame emitted on `ws/v1/scale/snapshot`. Mirrors
        the controller-level `WeightSnapshot` (raw scale frames are processed
        through the flow calculator before broadcast).
      properties:
        timestamp:
          type: string
          format: date-time
        weight:
          type: number
          description: Current weight reading in grams.
        weightFlow:
          type: number
          description: Smoothed weight-derived flow in g/s (moving average over the smoothing window).
        battery:
          type: integer
          nullable: true
          description: Scale battery level (0–100). Null if the scale does not report battery.
        timerValue:
          type: integer
          nullable: true
          description: Timer elapsed time in milliseconds. Null if scale doesn't support timers or timer hasn't been started.
    ScaleStatus:
      type: object
      description: >
        Connection status frame emitted by ws/v1/scale/snapshot when the
        socket opens and whenever scale connection state changes. Clients
        should keep the socket open across disconnected periods.
      properties:
        status:
          type: string
          enum: [connected, disconnected]
    ShotStateEvent:
      type: object
      description: >
        One frame on ws/v1/machine/shotState. Every frame carries the current
        shot phase and machine context so any single frame gives a coherent
        view; `decision` is non-null only for decision/terminal frames.
      required:
        [event, timestamp, state, scaleConnected, scaleLost,
         machineHasAutonomousSAW]
      properties:
        event:
          type: string
          enum: [state, decision, terminal]
        timestamp:
          type: string
          description: >
            ISO8601 timestamp of the machine snapshot that drove the event
            (matching the timestamps on ws/v1/machine/snapshot, so decisions
            can be time-aligned with telemetry). Wall clock only when no
            snapshot context exists (e.g. the idle re-seed after a
            disconnect).
        shotId:
          type: string
          nullable: true
          description: >
            Stable id for the shot, equal to the persisted ShotRecord id when
            the shot is saved. Null between shots.
        state:
          type: string
          enum: [idle, preheating, pouring, stopping, finished]
          description: Current shot phase as tracked by the sequencer.
        machineState:
          type: string
          nullable: true
          description: MachineState name from the latest machine snapshot.
        machineSubstate:
          type: string
          nullable: true
        profileFrame:
          type: integer
          nullable: true
          description: 0-based profile frame index from the latest snapshot.
        scaleConnected:
          type: boolean
        scaleLost:
          type: boolean
          description: >
            True once the scale dropped mid-shot. Sticky for the remainder of
            the shot — stop-at-weight stays disabled even if scaleConnected
            flips back.
        machineHasAutonomousSAW:
          type: boolean
          description: >
            True when the machine firmware runs its own stop-at-weight
            (Bengle) — the final target-yield stop is then firmware-side and
            reported as machineEnded.
        decision:
          type: object
          nullable: true
          description: Present on decision/terminal frames only.
          properties:
            kind:
              type: string
              enum: [advance, stop, abort, terminal, finalize]
              description: >
                advance = profile moved to the next step; stop = pour ended;
                abort = shot blocked before it ran; terminal = abnormal end
                (error/disconnect); finalize = post-stop settling window
                closed (not why the shot stopped).
            reason:
              type: string
              description: >
                OPEN SET — tolerate unknown values from newer builds. Known:
                targetWeight, targetVolume, apiStop, appStop, machineEnded,
                profileAdvance, profileSkip, noScale, error, disconnected,
                stoppingBackstop.
            details:
              type: string
              nullable: true
              description: Human-readable explanation.
            data:
              type: object
              nullable: true
              additionalProperties: true
              description: >
                Reason-specific numeric context (e.g. targetYield /
                projectedWeight for targetWeight, frame / stepExitWeight for
                profileSkip).
    MachineSnapshot:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        state:
          type: object
          properties:
            state:
              $ref: '#/components/schemas/MachineState'
            substate:
              $ref: '#/components/schemas/MachineSubstate'
        flow:
          type: number
        pressure:
          type: number
          example: 6.2
        targetFlow:
          type: number
        targetPressure:
          type: number
        mixTemperature:
          type: number
        groupTemperature:
          type: number
        targetMixTemperature:
          type: number
        targetGroupTemperature:
          type: number
        profileFrame:
          type: integer
        steamTemperature:
          type: number
    MachineState:
      type: string
      enum:
        - idle
        - booting
        - sleeping
        - heating
        - preheating
        - espresso
        - hotWater
        - flush
        - steam
        - skipStep
        - cleaning
        - descaling
        - transportMode
        - needsWater
        - error
      example: espresso
    MachineSubstate:
      type: string
      enum:
        - idle
        - preparingForShot
        - preinfusion
        - pouring
        - pouringDone
        - cleaningStart
        - cleaingGroup
        - cleanSoaking
        - cleaningSteam
      example: preparingForShot
    ShotSettings:
      type: object
      properties:
        steamSetting:
          type: integer
        targetSteamTemp:
          type: number
        targetSteamDuration:
          type: integer
        targetHotWaterTemp:
          type: number
        targetHotWaterVolume:
          type: number
        targetHotWaterDuration:
          type: integer
        targetShotVolume:
          type: number
        groupTemp:
          type: number
    WaterLevels:
      type: object
      properties:
        currentLevel:
          type: number
          description: Current water height in the tank (mm)
        refillLevel:
          type: number
          description: Water level threshold for refill warning (mm). Value is truncated to integer before being sent to the machine.
    De1RawMessage:
      type: object
      required:
        - type
        - operation
        - characteristicUUID
        - payload
      properties:
        type:
          $ref: '#/components/schemas/De1RawMessageType'
        operation:
          $ref: '#/components/schemas/De1RawOperationType'
        characteristicUUID:
          type: string
          description: UUID of the characteristic (len = 4).
        payload:
          type: string
          description: The data payload as a hex string.
    De1RawMessageType:
      type: string
      enum:
        - request
        - response
      description: Type of raw message indicating whether it's a request or response.
    De1RawOperationType:
      type: string
      enum:
        - read
        - write
        - notify
      description: Operation type indicating the nature of the raw message.
    SensorSnapshot:
      type: object
      required:
        - values
      properties:
        timestamp:
          type: string
          format: date-time
        id:
          type: string
          description: Sensor identifier
        values:
          type: object
          additionalProperties: true

    PluginMessage:
      type: object
      additionalProperties: true

    LogMessage:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        message:
          type: string

    DevicesState:
      type: object
      required:
        - timestamp
        - devices
        - scanning
      properties:
        timestamp:
          type: string
          format: date-time
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceInfo'
        scanning:
          type: boolean
          description: Whether a BLE/USB scan is currently in progress.
        connectionStatus:
          type: object
          description: Current state of the ConnectionManager orchestration.
          properties:
            phase:
              type: string
              enum:
                - idle
                - scanning
                - connectingMachine
                - connectingScale
                - ready
              description: Current connection phase. idle=no activity, scanning=BLE scan in progress, connectingMachine=connecting to DE1, connectingScale=connecting to scale, ready=all devices connected.
            foundMachines:
              type: array
              items:
                $ref: '#/components/schemas/DeviceInfo'
              description: Machines discovered during the last scan.
            foundScales:
              type: array
              items:
                $ref: '#/components/schemas/DeviceInfo'
              description: Scales discovered during the last scan.
            pendingAmbiguity:
              type: string
              enum:
                - machinePicker
                - scalePicker
              nullable: true
              description: If set, the UI should present a device picker for the indicated type.
            error:
              allOf:
                - $ref: '#/components/schemas/ConnectionError'
              nullable: true
              description: >
                Structured error object when a BLE operation has failed.
                Null when no error. See ConnectionError.

    DeviceInfo:
      type: object
      required:
        - name
        - id
        - state
        - type
      properties:
        name:
          type: string
          example: DE1
        id:
          type: string
          description: Device identifier (BLE MAC, UUID, or serial port path).
          example: 'AA:BB:CC:DD:EE:FF'
        state:
          type: string
          enum:
            - discovered
            - connecting
            - connected
            - disconnecting
            - disconnected
          description: Device connection state. discovered=found but never connected.
          example: connected
        type:
          type: string
          enum:
            - machine
            - scale
            - sensor
          example: machine
        available:
          type: boolean
          description: >
            true if the device is currently present in discovery; false for a
            remembered device that is not present (reported with state
            "disconnected"). Remembered devices persist across restarts until
            forgotten via the REST /api/v1/devices/forget endpoint.
          example: true

    DevicesCommand:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          enum:
            - scan
            - connect
            - disconnect
          description: The command to execute.
        deviceId:
          type: string
          description: Device identifier. Required for connect and disconnect commands.
        connect:
          type: boolean
          description: Whether to auto-connect discovered devices (scan command only).
          default: false
        quick:
          type: boolean
          description: Fire-and-forget scan without waiting for results (scan command only).
          default: false

    DisplayState:
      type: object
      properties:
        wakeLockEnabled:
          type: boolean
          description: Whether wake-lock is currently active
        wakeLockOverride:
          type: boolean
          description: Whether a skin has requested a wake-lock override
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          description: Actual applied brightness level (0-100). May differ from requestedBrightness if battery cap is active.
        requestedBrightness:
          type: integer
          minimum: 0
          maximum: 100
          description: The brightness level that was requested. If no battery cap is active, this equals brightness.
        lowBatteryBrightnessActive:
          type: boolean
          description: Whether the low battery brightness cap is currently limiting brightness
        platformSupported:
          type: object
          properties:
            brightness:
              type: boolean
              description: Whether brightness control is supported on this platform
            wakeLock:
              type: boolean
              description: Whether wake-lock is supported on this platform

    DisplayCommand:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          enum:
            - setBrightness
            - requestWakeLock
            - releaseWakeLock
          description: The display command to execute.
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          description: Brightness value (required when command is setBrightness).

