version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  logging: ^1.3.0
  logging_appenders: ^2.0.0
  # Injectable clock (fake_async-aware) for the stop-intent attribution window.
  clock: ^1.1.1
  flutter_foreground_task: ^9.2.2
  permission_handler: ^12.0.0+1
  rxdart: ^0.28.0
  shelf: ^1.0.0
  shelf_web_socket: ^3.0.0
  shelf_router: ^1.1.4
  battery_plus: ^7.0.0
  wakelock_plus: ^1.4.0
  screen_brightness: ^2.1.7
  collection: ^1.19.0
  shelf_plus: ^1.11.0
  shadcn_ui: ^0.54.0
  file_picker: ^11.0.2
  fl_chart: ^1.0.0
  flutter_launcher_icons: ^0.14.3
  uuid: ^4.5.1
  path_provider: ^2.1.5
  archive: ^4.0.7
  equatable: ^2.0.7
  universal_ble:
    git:
      url: https://github.com/tadelv/universal_ble.git
      ref: 2.2.0
  shared_preferences: ^2.5.3
  # share_plus HELD at 12.x — 13.x requires win32 ^6, which conflicts with
  # file_picker 11's win32 ^5.9 pin. 13.x is only SDK-floor bumps, no API gain.
  share_plus: ^12.0.2
  # saf_util/saf_stream HELD at 2.x — 3.x migrated to AGP 9, which requires
  # Gradle 9.4.1+ and enforces built-in Kotlin (hard-fails KGP-applying
  # plugins). Bump only after the AGP 9 migration. See pubspec KGP note.
  saf_util: ^2.0.0
  saf_stream: ^2.0.0
  # tadelv fork = AurelienBallier/flutter_libserialport (Android/USB support)
  # + macOS Swift Package Manager support (tadelv 6a26ab9). Drop the fork
  # once the SPM PR lands upstream.
  flutter_libserialport:
    # ^0.6.0
    git:
      url: https://github.com/tadelv/flutter_libserialport.git
      ref: main
  # usb_serial: ^0.5.2
  # usb_serial:
  #   git:
  #     url: https://github.com/AurelienBallier/usbserial_dart.git
  #     ref: master
  # usb_serial:
  #   git:
  #     url: https://github.com/jymden/usbserial.git
  #     ref: master
  # flutter_serial_communication: ^0.2.8
  shelf_static: ^1.1.3
  path: ^1.9.1
  args: ^2.7.0
  shelf_cors_headers: ^0.1.5
  url_launcher: ^6.3.2
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  ansi_escape_codes: ^3.1.1
  flutter_js:
    # path: ../dart_js
    git:
      url: https://github.com/tadelv/dart_js
      ref: master
  firebase_core: ^4.3.0
  firebase_crashlytics: ^5.0.6
  firebase_performance: ^0.11.1+3
  firebase_analytics: ^12.1.0
  http: ^1.2.2
  flutter_secure_storage: ^10.3.1
  # network_info_plus HELD at 7.x — 8.x needs win32 ^6, blocked by file_picker
  # 11's win32 ^5.9 (same cohort as share_plus 13 / saf 3). Windows-only dep.
  network_info_plus: ^7.0.0
  window_manager: ^0.5.1
  flutter_inappwebview: ^6.2.0-beta
  # device_info_plus HELD at 12.x — same win32-6 cohort (see share_plus /
  # network_info_plus notes). The whole +plus major wave is blocked by
  # file_picker 11's win32 ^5.9 pin until file_picker 12 (currently beta) ships.
  device_info_plus: ^12.4.0
  circular_buffer: ^0.13.0
  crypto: ^3.0.3
  cryptography: ^2.7.0
  drift: ^2.24.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  pretty_qr_code: ^3.6.0
  mime: ^2.0.0
  web_socket_channel: ^3.0.3
  # DNS-SD (mDNS) discovery for the WiFi Half Decent Scale. Native-backed on
  # every platform: NsdManager (Android), Bonjour (Apple), Avahi (Linux),
  # dns_sd (Windows) — so no app-managed MulticastLock is needed on Android.
  bonsoir: ^7.1.1
  # path: ../flutter_libserialport
  # git:
  #   url: https://github.com/tadelv/flutter_libserialport.git
  #   ref: main

dependency_overrides:
  # No-op stub: WPE WebKit 2.0 (libwpewebkit-2.0-dev) is not packaged for
  # Ubuntu/Debian, so the real flutter_inappwebview_linux plugin cannot build.
  flutter_inappwebview_linux:
    path: packages/flutter_inappwebview_linux_noop
  # TEMP: Xcode 26.4 / Swift 6.3 hard-errors on the WebAuthenticationSession
  # protocol-witness availability mismatch. Pin iOS+macOS plugins to the open
  # upstream fix (pichillilorenzo/flutter_inappwebview#2809) until it merges and
  # a release ships. Remove then.
  flutter_inappwebview_ios:
    git:
      url: https://github.com/wangqiang1588/flutter_inappwebview.git
      ref: fc33a449b9290b127a471808e22eb7b0edebad92
      path: flutter_inappwebview_ios
  flutter_inappwebview_macos:
    git:
      url: https://github.com/wangqiang1588/flutter_inappwebview.git
      ref: fc33a449b9290b127a471808e22eb7b0edebad92
      path: flutter_inappwebview_macos
  libserialport:
    git:
      url: https://github.com/tadelv/libserialport.dart
      ref: fix/reader-isolate-uhandled-throw
  # shadcn_ui 0.53.5 transitively pins lucide_icons_flutter 3.1.12, which
  # extends `IconData` — that broke after Flutter's CI SDK made
  # `IconData` final. Override to a newer lucide that compiles cleanly.
  # Remove once shadcn_ui ships a release that pins lucide >= 3.1.13 and
  # the ListTile/DecoratedBox regression introduced in 0.54.0 is fixed.
  lucide_icons_flutter: ^3.1.14

dev_dependencies:
  flutter_test:
    sdk: flutter

  fake_async: ^1.3.1
  flutter_lints: ^6.0.0
  # Test-only: mock url_launcher for the skin "Go to skin" button. Already
  # present transitively via url_launcher; declared so the test imports resolve.
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2
  hive_ce_generator: ^1.10.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    - assets/images/
    - assets/web/
    - assets/api/
    - assets/plugins/time-to-ready.reaplugin/
    - assets/plugins/visualizer.reaplugin/
    - assets/plugins/settings.reaplugin/
    - assets/plugins/dye2.reaplugin/
    - assets/plugins/decent-profile.reaplugin/
    - assets/defaultProfiles/
    - assets/bundled_skins/
    - skin_sources.json
