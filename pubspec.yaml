  shelf_web_socket: ^3.0.0
  shelf_router: ^1.1.4
  battery_plus: ^7.0.0
  wakelock_plus: ^1.4.0
  screen_brightness: ^2.1.7
  collection: ^1.19.0
  shelf_plus: ^1.11.0
  shadcn_ui: ^0.53.5
  file_picker: ^11.0.2
  fl_chart: ^1.0.0
  flutter_launcher_icons: ^0.14.3
  uuid: ^4.5.1
  path_provider: ^2.1.5
  archive: ^4.0.7
  equatable: ^2.0.7
  universal_ble: ^1.1.0
  shared_preferences: ^2.5.3
  share_plus: ^12.0.2
  saf_util: ^2.0.0
  saf_stream: ^2.0.0
  # maybe one day? https://github.com/AurelienBallier/flutter_libserialport
  flutter_libserialport:
    # ^0.6.0
    git:
      url: https://github.com/AurelienBallier/flutter_libserialport.git
      ref: main
  # usb_serial: ^0.5.2
  # usb_serial:
  #   git:
  #     url: https://github.com/AurelienBallier/usbserial_dart.git
  #     ref: master
  # usb_serial:
